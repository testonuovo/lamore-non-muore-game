<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flying Plane Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background:blue;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    #plane {
        position: absolute;
        left: 100px;
        top: 300px;
        font-size: 40px;
    }
     
    #message {
        position: absolute;
        top: 40%;
        width: 100%;
        font-size: 40px;
        display: none;
    }

    #restartBtn {
        display: none;
        position: absolute;
        top: 55%;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        font-size: 24px;
        cursor: pointer;
        border: 2px solid #00ff88;
        border-radius:19px;
        background:blue;
        color:red;
    }
    #restartBtn:hover {
        background:red;
        color: black;
    }

    #levelDisplay, #scoreDisplay {
        position: absolute;
        top: 10px;
        font-size: 24px;
        padding: 5px 10px;
        background: rgba(0,0,0,0.5);
        border-radius: 10px;
    }

    #scoreDisplay {
        right: 10px;
        left: auto;
    }

    .obstacle {
        position: absolute;
        width:19px;
        background:red;
    }
</style>
</head>

<body>
<div id="plane">✈️</div>
<div id="message">YOU DON'T GIVE UP 🔥</div>
<button id="restartBtn" onclick="restartGame()">Restart</button>
<div id="levelDisplay">Level: 1</div>
<div id="scoreDisplay">Score: 0</div>

<!-- Sottofondo musicale -->
<!-- Per file locale: metti l'mp3 nella stessa cartella e scrivi solo il nome del file -->
<audio id="bgMusic" src="https://raw.githubusercontent.com/testonuovo/lamore-non-muore-game/main/l'amore%20non%20muore%20(3).mp3" loop></audio>
<!-- Oppure usa un link diretto: 
<audio id="bgMusic" src="https://www.tuosito.com/musica/lamore_non_muore.mp3" loop></audio>
-->

<script>
let plane = document.getElementById("plane");
let message = document.getElementById("message");
let restartBtn = document.getElementById("restartBtn");
let levelDisplay = document.getElementById("levelDisplay");
let scoreDisplay = document.getElementById("scoreDisplay");
let bgMusic = document.getElementById("bgMusic");

let y, velocity, gravity, lift, timeAlive, gameOver;
let level, score, difficultyTimer, obstacles;
let musicStarted = false;

function initGame() {
    y = 300;
    velocity = 0;
    gravity = 0.25;
    lift = -5;
    timeAlive = 0;
    gameOver = false;

    level = 1;
    score = 0;
    difficultyTimer = 0;
    obstacles = [];

    message.style.display = "none";
    restartBtn.style.display = "none";

    updateDisplay();
    plane.style.top = y + "px";

    requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        velocity = lift;
        if(!musicStarted) {
            bgMusic.play().catch(()=>{});
            musicStarted = true;
        }
    }
});

function updateDisplay() {
    levelDisplay.innerHTML = "Level: " + level;
    scoreDisplay.innerHTML = "Score: " + score;
}

function createObstacle() {
    let height = Math.random() * 200 + 50;
    let yPos = Math.random() * (window.innerHeight - height);
    let obstacle = document.createElement("div");
    obstacle.className = "obstacle";
    obstacle.style.height = height + "px";
    obstacle.style.top = yPos + "px";
    obstacle.style.left = window.innerWidth + "px";
    document.body.appendChild(obstacle);
    obstacles.push(obstacle);
}

function moveObstacles() {
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        let x = obs.offsetLeft - 5 - level;
        obs.style.left = x + "px";

        let planeRect = plane.getBoundingClientRect();
        let obsRect = obs.getBoundingClientRect();

        if (
            planeRect.right > obsRect.left &&
            planeRect.left < obsRect.right &&
            planeRect.bottom > obsRect.top &&
            planeRect.top < obsRect.bottom
        ) {
            endGame();
        }

        if (x < -50) {
            obs.remove();
            obstacles.splice(i, 1);
        }
    }
}

function endGame() {
    gameOver = true;
    message.style.display = "block";
    restartBtn.style.display = "block";
    bgMusic.pause();
}

function restartGame() {
    obstacles.forEach(obs => obs.remove());
    musicStarted = false;
    bgMusic.currentTime = 0;
    initGame();
    alert("don't give up");
}

function gameLoop() {
    if (gameOver) return;

    velocity += gravity;
    y += velocity;

    if (y < 0) y = 0;
    if (y > window.innerHeight - 50) {
        endGame();
    }

    timeAlive++;
    score = Math.floor(timeAlive / 10);
    if (score > level * 50) level++;

    difficultyTimer++;
    if (difficultyTimer > 120) {
        gravity += 0.02;
        lift -= 0.05;
        difficultyTimer = 0;
    }

    if (timeAlive % 150 === 0) createObstacle();

    moveObstacles();
    updateDisplay();
    plane.style.top = y + "px";

    requestAnimationFrame(gameLoop);
}

initGame();
</script>

</body>
</html>
